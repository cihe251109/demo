<html lang="en">
<head>

  <title>Table Only</title>
</head>
<body>
  <table>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>
    <tr>
      <td>Alice</td>
      <td>25</td>
      <td>Melbourne</td>
    </tr>
    <tr>
      <td>Bob</td>
      <td>30</td>
      <td>Sydney</td>
    </tr>
  </table>
</body>
</html>
